name: Key Vault Test

on: [workflow_dispatch]

jobs:
  job:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_SP_CREDS }}
          enable-AzPSSession: true
      
      - name: Get secrets
        run: |
          az keyvault secret list --vault-name rs-github-secrets
