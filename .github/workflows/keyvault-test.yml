name: Key Vault Test

on: [workflow_dispatch]

jobs:
  job:
    runs-on: ubuntu-latest
    steps:
      - name: Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_SP_CREDS }}
      
      - name: Get secret
        id: get-secret
        run: |
          secret=$(az keyvault secret show --name MySecret --vault-name rs-github-secrets --query value -o tsv)
          echo "::add-mask::$secret"
          echo "secret-value=$secret" >> $GITHUB_OUTPUT
      
      - name: Show secret
        run: |
          echo "The value is: ${{ steps.get-secret.outputs.secret-value }}"